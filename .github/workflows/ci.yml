name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Type-check, lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @saas/auth check-types
      - run: pnpm --filter api check-types
      - run: pnpm --filter @saas/auth lint
      - run: pnpm --filter api lint
      - run: pnpm --filter api exec tsx src/index.ts
